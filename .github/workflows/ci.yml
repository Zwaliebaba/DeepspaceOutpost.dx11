name: CI (Windows build)

# Phase 0 of the MMO migration: a Windows build oracle.
# The project is MSVC / Direct3D 11 / C++/WinRT and only builds on Windows, so
# every change is verified here (it cannot be compiled in a Linux dev container).
# See docs/MIGRATION_ROADMAP.md.

on:
  push:
    branches:
      - "claude/mmo-space-game-migration-mebbox"
      - main
      - master
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save Windows runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.preset }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        # PR guidelines require at least x64 Debug and Release.
        preset: [x64-debug, x64-release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Sets cl.exe, Ninja and VSINSTALLDIR on PATH/env so the CMake presets
      # (Ninja generator + cl.exe + the SegmentHeap top-level include) resolve.
      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      # The presets pull in VS's SegmentHeap.cmake (a local VS CMake component
      # under $VSINSTALLDIR) that isn't installed on hosted runners. It's only a
      # Segment-Heap opt-in and isn't needed to verify the build, so override it
      # to empty here. bash gives unambiguous empty-assignment parsing; the MSVC
      # env from the previous step is exported to the whole job.
      - name: Configure (${{ matrix.preset }})
        shell: bash
        run: cmake --preset ${{ matrix.preset }} -DCMAKE_PROJECT_TOP_LEVEL_INCLUDES=

      - name: Build (${{ matrix.preset }})
        shell: bash
        run: cmake --build --preset ${{ matrix.preset }}
